[advisories]
db-path = "~/.cargo/advisory-db"
unmaintained = "workspace"
yanked = "warn"

[licenses]
# This is a permissively licensed crate — GPL is NOT allowed.
# If a dependency introduces GPL, this crate cannot use it.
allow = [
    "MIT",
    "Apache-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
