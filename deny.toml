# cargo-deny configuration for cnc-formats
# This crate is MIT OR Apache-2.0 — every dependency must be compatible.

[advisories]
yanked = "deny"
ignore = [
    # RUSTSEC-2025-0141: bincode 1.3.3 is "unmaintained" — not a security issue.
    # The bincode team considers 1.3.3 complete; iai-callgrind (dev-only) uses it
    # for Callgrind benchmark serialization.  No upgrade path exists upstream.
    { id = "RUSTSEC-2025-0141", reason = "dev-only via iai-callgrind; unmaintained advisory, no known vulnerability" },
]

[licenses]
allow = ["MIT", "Apache-2.0", "Unicode-3.0", "Unlicense"]

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
